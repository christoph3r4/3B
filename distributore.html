<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Distributore - Progetto di Gruppo</title>
    <style> 
    
        body {
            text-align: center;
            /* display: flex; trasforma il contenitore in un flexbox per allineare facilmente gli elementi */
            display: flex;
            /* flex-direction: column; dispone gli elementi uno sotto l'altro in verticale */
            flex-direction: column;   
            justify-content: center;
            align-items: center;         
            font-family: Arial, sans-serif;
            /* min-height: 100vh; l'elemento occupa almeno l'altezza totale della finestra del browser */
            min-height: 100vh;
        }

        h1{
            margin: 20px;
            /* margin: spazio ESTERNO intorno all'elemento */  
        }

        hr {
            width: 100%;
            margin-bottom: 40px;   
            /* margin-bottom: spazio sotto l'elemento */
        }
        
        .disstributore {
            display: flex;
            width: 600px;
            height: 800px;
            background-color: #ff1900;
            padding: 30px;
            /* padding: 30px; spazio INTERNO ai bordi dell'elemento (tutti i lati) */
            border: 5px solid black;
        }

        .pancia {
            width: 200px;
            height: 730px;
            background-color: lightslategray;
            padding: 20px;
            border: 10px solid black;
            /* border-radius: 10px; arrotonda gli angoli del riquadro di 10px */
            border-radius: 10px;
            display: flex;
            flex-direction: column;
        }

        .griglia-prodotti {
            display: grid;
            gap: 15px;
            /* gap: 15px; spazio tra gli elementi della griglia (righe e colonne) */
            margin-top: 30px;
            /* margin-top: spazio SOPRA l'elemento */
        }

        .prodotto {
            border: 3px solid black;
            width: 165px;
            height: 95px;
            background-color: #ffffff;
            color: #333333;
            padding: 10px;
            text-align: center;
            border-radius: 25px;
            /* font-weight: bold; rende il testo in grassetto */
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tastierino {
            width: 200px;
            margin-left: 25px;
            display: flex;
            flex-direction: column;
        }

        .display-digitale {
            width: 310px;
            height: 60px;
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            border: 3px solid white;
            margin-bottom: 20px;
            text-align: center;
            /* line-height: 60px; altezza della riga, utile per centrare verticalmente il testo */
            line-height: 60px;
        }

        input {
            width: 303px;
            height: 45px;
            margin-bottom: 20px;
            padding-left: 10px;
            font-size: 16px;
            border-radius: 5px;
            /* border: none; rimuove il bordo dell'elemento */
            border: none;
        }

        button {
            width: 315px;
            height: 50px;
            margin-bottom: 20px;
            background-color: #f1c40f;
            border: none;
            border-radius: 5px;
            /* font-weight: bold; rende il testo in grassetto */
            font-weight: bold;
            /* cursor: pointer; quando passi sopra l'elemento con il mouse, il cursore diventa la manina */
            cursor: pointer;
            font-size: 14px;
        }

        #vano-ritiro1 {
            width: 180px;
            height: 120px;
            margin-top: auto;
            background-color: black;
            border: 5px white solid;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            /* font-weight: bold; rende il testo in grassetto */
            font-weight: bold;
        }

        .operazioni {
            overflow-y: auto;
            width: 290px;
            height: 250px;
            background-color: black;
            color: white;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            border-radius: 5px;
            border: 3px solid white;
            margin-bottom: 20px;
            text-align: center;
            /* line-height: 60px; altezza della riga, utile per centrare verticalmente il testo */
            line-height: 60px;
        }

    </style>
</head>
<body>
    <h1>PROGETTO DI GRUPPO - DISTRIBUTORE AUTOMATICO</h1>
    <hr>
   
    <div class="disstributore">
        <div class="pancia">
            <h2 style="color:white; text-align:center; margin:0px;">DISTRIBUTORE</h2>
            <div class="griglia-prodotti">
                <div class="prodotto">A1: Acqua<br>1.00€</div>
                <div class="prodotto">A2: Snack<br>2.00€</div>
                <div class="prodotto">A3: Caffè<br>1.50€</div>
                <div class="prodotto">A4: Succo<br>2.50€</div>
            </div>
            <br>
            <div id="vano-ritiro1">RITIRA QUI</div>
        </div>

        <div class="tastierino">
            <div class="display-digitale">
                € <span id="livello">0.00</span>
            </div>

            <button id="aggiungi-btn1">INSERISCI 1€</button>

            <button id="aggiungi-btn2" style="background-color: #f1c40f; color: black;">INSERISCI 0.50€</button>
            
            <input type="text" id="input-nome" placeholder="inserisci codice">
            <button id="bottone-saluta" style="background-color: blue; color: white;">EROGA</button>
            <button id="bottone-resto" style="background-color: green; color: white;">$RESTO$</button>

            <div class="operazioni" id="output-tabellina">
                SISTEMA PRONTO...
            </div>
        </div>
    </div>

    <!-- footer: sezione finale della pagina (di solito informazioni di chiusura, crediti, ecc.) -->
    <footer class="footer" style="margin-top: 40px; color: black; background-color: grey; padding: 20px; width: 100%; text-align: center;">
        © 2025 - Tutti i diritti riservati
    </footer>

    <script>
        let credito = 0;
        const displayCredito = document.getElementById('livello');
        const Operazioni = document.getElementById('output-tabellina');
        const vanoRitiro1 = document.getElementById('vano-ritiro1');

        function aggiornaDisplay() {
            /* toFixed(2): trasforma il numero in stringa con esattamente 2 decimali (es. 1 → "1.00") */
            /* innerHTML: imposta il contenuto HTML (testo + eventuali tag) dentro l'elemento displayCredito */
            displayCredito.innerHTML = (Math.round(credito * 100) / 100).toFixed(2);
        }

        document.getElementById('aggiungi-btn1').addEventListener('click', function() {
            credito = Math.round((credito + 1) * 100) / 100;
            aggiornaDisplay();
            /* innerHTML: imposta il contenuto HTML (testo + eventuali tag) dentro l'elemento Operazioni */
            Operazioni.innerHTML = "Hai inserito 1€<br>" + Operazioni.innerHTML;
        });

        document.getElementById('aggiungi-btn2').addEventListener('click', function() {
            credito = Math.round((credito + 0.50) * 100) / 100;
            aggiornaDisplay();
            Operazioni.innerHTML = "Hai inserito 0.50€<br>" + Operazioni.innerHTML;
        });

        document.getElementById('bottone-saluta').addEventListener('click', function() {
            /* .value: prende il testo inserito nella casella di input */
            /* .toUpperCase(): converte tutto il testo in maiuscolo (es. "a1" → "A1") */
            let codice = document.getElementById('input-nome').value.toUpperCase();
            let prezzo = 0;

            if (codice === "A1") { prezzo = 1; }
            else if (codice === "A2") { prezzo = 2; }
            else if (codice === "A3") { prezzo = 1.5; }
            else if (codice === "A4") { prezzo = 2.5; }
            else {
                Operazioni.innerHTML = "CODICE ERRATO!<br>" + Operazioni.innerHTML;
                return;
            }

            if (credito >= prezzo) {
                credito = Math.round((credito - prezzo) * 100) / 100;
                aggiornaDisplay();
                vanoRitiro1.innerHTML = "RITIRA QUI: " + codice;
                vanoRitiro1.style.backgroundColor = "#0000ff";
                Operazioni.innerHTML = "RITIRA QUI " + codice + " (-" + prezzo.toFixed(2) + "€)<br>" + Operazioni.innerHTML;
            } else {
                Operazioni.innerHTML = "SOLDI INSUFFICIENTI!<br>" + Operazioni.innerHTML;
                vanoRitiro1.style.backgroundColor = "#c0392b";
            }
            
            document.getElementById('input-nome').value = "";
        });

        vanoRitiro1.addEventListener('mouseenter', function() {
            if(vanoRitiro1.style.backgroundColor !== '') {
                vanoRitiro1.innerHTML = "RITIRA QUI:";
                vanoRitiro1.style.backgroundColor = "#111111";
            }
        });

        document.getElementById('vano-ritiro1').addEventListener('mouseleave', function() {
                vanoRitiro1.innerHTML = "RITIRA QUI:"; 
                vanoRitiro1.style.backgroundColor = "#111111";
        });

        document.getElementById('bottone-resto').addEventListener('click', function() {
            if (credito > 0) {
                Operazioni.innerHTML = "Erogazione resto<br>" + Operazioni.innerHTML;
                credito = 0;
                aggiornaDisplay();
                vanoRitiro1.innerHTML = "RITIRA QUI";
                vanoRitiro1.style.backgroundColor = "#27ae60";
            } else {
                Operazioni.innerHTML = "SOLDI INSUFFICIENTI!<br>" + Operazioni.innerHTML;
                vanoRitiro1.style.backgroundColor = "#c0392b";
            }
        });
    </script>
</body>
</html>
